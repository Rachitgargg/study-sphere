version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/backend/uploads:rw
      - ./backend/vector_db:/backend/vector_db:rw
    environment:
      - APP_NAME=StudySphere AI API
      - DEBUG=True
      - PORT=8000
      - HOST=0.0.0.0
      - GROQ_API_KEY=${GROQ_API_KEY:-your_groq_api_key_here}
      - GROQ_MODEL=llama3-70b-8192
      - VECTOR_DB_DIR=vector_db
      - UPLOAD_DIR=uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
